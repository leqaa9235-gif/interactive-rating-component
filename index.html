<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="interactive-rating-component-main\images\favicon-32x32.png">
  
  <title>Frontend Mentor | Interactive rating component</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders:opsz,wght@10..72,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lexend+Deca:wght@100..900&family=Overpass:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Rating state start -->
 <div class="state-rating">
  <div class="star-img"><img src="interactive-rating-component-main\images\icon-star.svg" alt="star image"></div>
  <h2 class="h2">How did we do?</h2> 

  <p class="p">Please let us know how we did with your support request. All feedback is appreciated 
  to help us improve our offering!</p> 
  <div class="rate-holder">
  <div class="rating">1</div>
  <div class="rating">2</div>
  <div class="rating">3</div>
  <div class="rating">4</div> 
  <div class="rating">5</div>
  </div>
  <button class="btn">SUBMIT</button>
</div>

  <div class="state-thankyou">
  <img src="interactive-rating-component-main\images\illustration-thank-you.svg" alt="Thank you image" class="thankyou-img">
  <div class="selected-rating">
     You selected
  </div>
 
   <h1 class="h22">Thank you!</h1>
   <p class="thankyou-p">We appreciate you taking the time to give a rating. If you ever need more support, 
   don’t hesitate to get in touch! 
   
  </div>
 
<script src="script.js"></script>

  
  
</body>
</html>
